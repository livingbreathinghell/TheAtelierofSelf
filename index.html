  <style>
    body > *:not(#loading-screen) {
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    body.loaded > *:not(#loading-screen) {
      opacity: 1;
    }

    #loading-screen {
      opacity: 1 !important;
    }
  </style>

<style>
#posts-container,
.recent-divider {
  opacity: 0;
  visibility: hidden;
}

body.posts-ready #posts-container,
body.posts-ready .recent-divider {
  opacity: 1;
  visibility: visible;
  transition: opacity 0.4s ease;
}


</style>



  <script>
const isDev = true;   

    const version = isDev ? new Date().getTime() : "1.0.0";

    const cssFiles = [
      "loading.css",
      "welcome-panel.css",
     "featured-panel.css",
      "global.css",
      "header.css",
      "fortune.css",
      "journalpost.css",
      "astrologypost.css",
      "playlist.css",
      "editposts.css",
      "minigame.css",
      "rotating-playlists.css",
      "view.css",
      "bucketlist.css",
      "calendar.css",
      "visitor-counter.css",
     "stampmarquee.css",
      "journal-welcome-panel.css",
     "gallery.css",
     "content-hub.css",
    "transits.css"
    ];

    cssFiles.forEach(file => {
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = `css/${file}?v=${version}`;
      document.head.appendChild(link);
    });
  </script>
