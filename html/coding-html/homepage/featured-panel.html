<div class="featured-panel-wrapper">
  <div class="featured-body">

    <!-- Header row: inside the panel, no divider -->
    <div class="featured-header-row">
      <div class="featured-label-zone">
        <span class="featured-label">featured content</span>
      </div>
      <div class="featured-tab">
        <span class="featured-tab-name" id="featured-tab-name">— —</span>
      </div>
    </div>

    <!-- Carousel (inset with padding for inner-border feel) -->
    <div class="featured-carousel-area">
      <div class="featured-carousel-track" id="featured-carousel-track"></div>
      <div class="featured-dots-row" id="featured-dots"></div>
    </div>

    <!-- Footer -->
    <div class="featured-footer">
      <a class="featured-enter-link" id="featured-enter-link" href="#">enter</a>
      <div class="featured-reactions">
        <div class="reaction-col">
          <div class="reaction-label">like</div>
          <button class="reaction-btn like-btn" id="featured-like">▲</button>
          <span class="reaction-count" id="featured-like-count">0</span>
        </div>
        <div class="reaction-divider"></div>
        <div class="reaction-col">
          <div class="reaction-label">dislike</div>
          <button class="reaction-btn dislike-btn" id="featured-dislike">▼</button>
          <span class="reaction-count" id="featured-dislike-count">0</span>
        </div>
      </div>
    </div>

  </div>
</div>
